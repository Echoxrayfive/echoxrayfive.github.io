<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR ZOOM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #message {
    position: fixed;
    top: 50%; left: 50%;
    z-index: 10;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
  }
  #message span {
    display: inline-block;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: clamp(2.5rem, 12vw, 7rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    -webkit-text-stroke: 2px rgba(0,0,0,0.4);
  }
  @keyframes msgPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.1) rotate(-5deg); }
    12%  { opacity: 1; transform: translate(-50%, -50%) scale(1.25) rotate(2deg); }
    22%  { opacity: 1; transform: translate(-50%, -50%) scale(0.95) rotate(-1deg); }
    30%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    72%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3) rotate(3deg); }
  }
  .msg-show {
    animation: msgPop 4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="message"><span id="msgText"></span></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', () => { resize(); buildNebula(); });

// Star field
const NUM_STARS = 500;
const BASE_SPEED = 7;

class Star {
  constructor() { this.reset(true); }

  reset(initial = false) {
    this.x = (Math.random() - 0.5) * 2 * W;
    this.y = (Math.random() - 0.5) * 2 * H;
    this.z = initial ? Math.random() * W : W;
    this.pz = this.z;
    const r = Math.random();
    if (r < 0.55)      this.hue = 220;
    else if (r < 0.75) this.hue = 200;
    else if (r < 0.88) this.hue = 260;
    else if (r < 0.95) this.hue = 30;
    else               this.hue = 0;
  }

  update() {
    this.pz = this.z;
    this.z -= BASE_SPEED;
    if (this.z <= 1) this.reset();
  }

  draw() {
    const sx = (this.x / this.z) * W + cx;
    const sy = (this.y / this.z) * H + cy;
    const px = (this.x / this.pz) * W + cx;
    const py = (this.y / this.pz) * H + cy;

    const t = 1 - this.z / W;
    const r = Math.max(0.4, t * 3.5);
    const alpha = Math.min(1, t * 2.2);
    const sat = (this.hue === 0 || this.hue === 30) ? 90 : 60;
    const lit = 75 + t * 25;

    ctx.strokeStyle = `hsla(${this.hue}, ${sat}%, ${lit}%, ${alpha})`;
    ctx.lineWidth = r;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(sx, sy);
    ctx.stroke();
  }
}

const stars = Array.from({ length: NUM_STARS }, () => new Star());

// Nebula background (pre-rendered offscreen)
const nebula = document.createElement('canvas');

function buildNebula() {
  nebula.width  = W;
  nebula.height = H;
  const nc = nebula.getContext('2d');

  const base = nc.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.hypot(W, H) / 2);
  base.addColorStop(0,   '#0c0025');
  base.addColorStop(0.5, '#080018');
  base.addColorStop(1,   '#020008');
  nc.fillStyle = base;
  nc.fillRect(0, 0, W, H);

  const blobs = [
    { x: 0.15, y: 0.25, r: 0.55, color: 'rgba(90,  0, 160, 0.18)' },
    { x: 0.80, y: 0.70, r: 0.50, color: 'rgba(0,  40, 130, 0.18)' },
    { x: 0.55, y: 0.85, r: 0.42, color: 'rgba(140,  0,  60, 0.14)' },
    { x: 0.70, y: 0.15, r: 0.38, color: 'rgba(0,  90, 160, 0.12)' },
    { x: 0.30, y: 0.70, r: 0.40, color: 'rgba(60,  0, 180, 0.12)' },
    { x: 0.50, y: 0.40, r: 0.30, color: 'rgba(0, 160, 130, 0.07)' },
  ];
  for (const b of blobs) {
    const g = nc.createRadialGradient(b.x * W, b.y * H, 0, b.x * W, b.y * H, b.r * Math.max(W, H));
    g.addColorStop(0, b.color);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    nc.fillStyle = g;
    nc.fillRect(0, 0, W, H);
  }
}
buildNebula();

function drawBackground() {
  ctx.drawImage(nebula, 0, 0, W, H);
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  drawBackground();
  stars.forEach(s => { s.update(); s.draw(); });
}
animate();

// Messages
const messages = [
  { text: 'Help!',              color: '#ff4455' },
  { text: 'Ahhh!',              color: '#ff8800' },
  { text: 'Charlie Stinks!!!!', color: '#44ff66' },
  { text: 'Katie Stinks!!!',    color: '#ff44ff' },
  { text: 'EEEk!',              color: '#ffff33' },
  { text: 'Poop',               color: '#cc8833' },
  { text: 'Jamie Smells!!!',    color: '#00ffee' },
  { text: 'Owi Smells!!',       color: '#ff66bb' },
  { text: 'Weeeeee!!!',         color: '#66aaff' },
  { text: 'Oh No!',             color: '#ff3366' },
  { text: 'Yikes!!!',           color: '#ffaa00' },
  { text: 'Gross!!',            color: '#88ff44' },
  { text: 'Ewww!!!',            color: '#ff88dd' },
  { text: 'Nooooo!!',           color: '#ff0077' },
  { text: 'Stinky!!!',          color: '#aaff00' },
  { text: 'Bum Bum!!',          color: '#ff7744' },
  { text: 'Run!!',              color: '#00ffaa' },
  { text: 'BLEURGH!!',          color: '#cc44ff' },
  { text: 'Uh Oh!!!',           color: '#ffcc00' },
  { text: 'STENCH!!!',          color: '#99dd00' },
  { text: 'Disgusting!!',       color: '#ff44aa' },
  { text: 'NOT IT!!!',          color: '#44ccff' },
  { text: 'POO POO!!!',         color: '#bb7722' },
  { text: 'Eeeeek!!!',          color: '#ff99ff' },
  { text: 'Smelly!!!!!',        color: '#77ff77' },
  { text: 'Oh Gross!!!',        color: '#ffaa44' },
];

const msgEl   = document.getElementById('message');
const msgText = document.getElementById('msgText');
let lastIdx   = -1;

function showMessage() {
  let idx;
  do { idx = Math.floor(Math.random() * messages.length); } while (idx === lastIdx && messages.length > 1);
  lastIdx = idx;
  const m = messages[idx];

  msgText.textContent = m.text;
  msgText.style.color = m.color;
  msgText.style.textShadow = `0 0 20px ${m.color}, 0 0 50px ${m.color}, 0 0 90px ${m.color}`;

  msgEl.classList.remove('msg-show');
  void msgEl.offsetWidth;
  msgEl.classList.add('msg-show');
}

setTimeout(() => {
  showMessage();
  setInterval(showMessage, 10000);
}, 4000);
</script>
</body>
</html>
