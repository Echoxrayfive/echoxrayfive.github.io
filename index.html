<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUN ZONE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body {
    overflow: hidden;
    min-height: 100vh;
    background: linear-gradient(135deg, #7a003d, #7a4400, #806000, #006b38, #005580, #3a1a80, #7a003d);
    background-size: 400% 400%;
    animation: gradientShift 6s ease infinite;
  }

  #message {
    position: fixed;
    top: 50%;
    left: 50%;
    z-index: 10;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
    transform: translate(-50%, -50%);
  }

  #message span {
    display: inline-block;
    font-family: Arial, sans-serif;
    font-size: clamp(2.5rem, 12vw, 7rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  @keyframes msgPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    25%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    75%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
  }

  .msg-show {
    animation: msgPop 4s ease forwards;
  }
</style>
</head>
<body>
<div id="message"><span id="msgText"></span></div>

<script>

// Messages
const messages = [
  { text: 'Help!',              color: '#ff4455' },
  { text: 'Ahhh!',              color: '#ff8800' },
  { text: 'Charlie Stinks!!!!', color: '#44ff66' },
  { text: 'Katie Stinks!!!',    color: '#ff44ff' },
  { text: 'EEEk!',              color: '#ffff33' },
  { text: 'Poop',               color: '#cc8833' },
  { text: 'Jamie Smells!!!',    color: '#00ffee' },
  { text: 'Owi Smells!!',       color: '#ff66bb' },
  { text: 'Weeeeee!!!',         color: '#66aaff' },
  { text: 'Oh No!',             color: '#ff3366' },
  { text: 'Yikes!!!',           color: '#ffaa00' },
  { text: 'Gross!!',            color: '#88ff44' },
  { text: 'Ewww!!!',            color: '#ff88dd' },
  { text: 'Nooooo!!',           color: '#ff0077' },
  { text: 'Stinky!!!',          color: '#aaff00' },
  { text: 'Bum Bum!!',          color: '#ff7744' },
  { text: 'Run!!',              color: '#00ffaa' },
  { text: 'BLEURGH!!',          color: '#cc44ff' },
  { text: 'Uh Oh!!!',           color: '#ffcc00' },
  { text: 'STENCH!!!',          color: '#99dd00' },
  { text: 'Disgusting!!',       color: '#ff44aa' },
  { text: 'NOT IT!!!',          color: '#44ccff' },
  { text: 'POO POO!!!',         color: '#bb7722' },
  { text: 'Eeeeek!!!',          color: '#ff99ff' },
  { text: 'Smelly!!!!!',        color: '#77ff77' },
  { text: 'Oh Gross!!!',        color: '#ffaa44' },
];

const msgEl   = document.getElementById('message');
const msgText = document.getElementById('msgText');
let lastIdx   = -1;

function showMessage() {
  let idx;
  do { idx = Math.floor(Math.random() * messages.length); } while (idx === lastIdx && messages.length > 1);
  lastIdx = idx;
  const m = messages[idx];

  msgText.textContent = m.text;
  msgText.style.color = m.color;

  msgEl.classList.remove('msg-show');
  void msgEl.offsetWidth;
  msgEl.classList.add('msg-show');
}

setTimeout(() => {
  showMessage();
  setInterval(showMessage, 10000);
}, 4000);
</script>
</body>
</html>
